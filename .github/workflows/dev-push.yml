# .github/workflows/dev-push.yml
# ─────────────────────────────────────────────────────────────
# Push to main → build all images → deploy to dev.
# ── PROJECT-SPECIFIC: edit the `with:` values below. ─────────
# ─────────────────────────────────────────────────────────────
name: CI → Dev

on:
  push:
    branches: [main]

concurrency:
  group: dev-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      # ┌──────────────────────────────────────────────────────┐
      # │  EDIT: list your Docker images here                  │
      # │  name   = image name in registry                     │
      # │  context    = docker build context path              │
      # │  dockerfile = path to Dockerfile                     │
      # └──────────────────────────────────────────────────────┘
      images: >-
        [
          { "name": "mcp-router-backend",  "context": "./backend",  "dockerfile": "./backend/Dockerfile" },
          { "name": "mcp-router-frontend", "context": "./frontend", "dockerfile": "./frontend/Dockerfile" }
        ]

  deploy:
    needs: build
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      namespace: mcp-router-dev        # EDIT: your dev namespace
      deployments: "backend,frontend"  # EDIT: comma-separated deployment names
      rollout_timeout: "600s"
