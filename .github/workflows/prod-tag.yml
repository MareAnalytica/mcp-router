# .github/workflows/prod-tag.yml
# ─────────────────────────────────────────────────────────────
# Tag v* → build all images → deploy to prod.
# ── PROJECT-SPECIFIC: edit the `with:` values below. ─────────
# ─────────────────────────────────────────────────────────────
name: Release → Prod

on:
  push:
    tags: ["v*"]

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      # ┌──────────────────────────────────────────────────────┐
      # │  EDIT: same image list as dev-push.yml               │
      # └──────────────────────────────────────────────────────┘
      images: >-
        [
          { "name": "mcp-router-backend",  "context": "./backend",  "dockerfile": "./backend/Dockerfile" },
          { "name": "mcp-router-frontend", "context": "./frontend", "dockerfile": "./frontend/Dockerfile" }
        ]

  deploy:
    needs: build
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      namespace: mcp-router            # EDIT: your prod namespace
      deployments: "backend,frontend"  # EDIT: comma-separated deployment names
