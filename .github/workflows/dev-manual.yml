# .github/workflows/dev-manual.yml
# ─────────────────────────────────────────────────────────────
# Manually build + deploy any branch to dev.
# Trigger from: Actions tab → "Deploy Branch → Dev" → Run workflow → pick branch
# ─────────────────────────────────────────────────────────────
name: Deploy Branch → Dev

on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      images: >-
        [
          { "name": "MY_PROJECT-backend",  "context": "./backend",  "dockerfile": "./backend/Dockerfile" },
          { "name": "MY_PROJECT-frontend", "context": "./frontend", "dockerfile": "./frontend/Dockerfile" }
        ]

  deploy:
    needs: build
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: dev
      namespace: MY_PROJECT-dev
      deployments: "backend,frontend"
