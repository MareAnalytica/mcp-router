# kube/base/secrets.yaml
# EDIT: replace values with your actual credentials
# WARNING: for production, use sealed-secrets or external-secrets instead
apiVersion: v1
kind: Secret
metadata:
  name: MY_PROJECT-db
type: Opaque
stringData:
  POSTGRES_DB: mydb
  POSTGRES_USER: myuser
  POSTGRES_PASSWORD: changeme
  DATABASE_URL: "postgresql+asyncpg://myuser:changeme@db:5432/mydb"
