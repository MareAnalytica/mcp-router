# kube/overlays/prod/kustomization.yaml
# Production overlay — uses base resources and namespace as-is
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-router

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: mcp-router
    patch: |
      - op: replace
        path: /metadata/name
        value: mcp-router
